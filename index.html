<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RAMODA intro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at 30% 40%, #1a1a2e, #0a0a0f);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Import Inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

        /* Animated gradient overlay */
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 220, 130, 0.08), transparent 70%);
            pointer-events: none;
            animation: pulseGlow 6s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
            100% { opacity: 0.3; transform: scale(1); }
        }

        /* Floating decorative circles */
        .decorative-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.15), rgba(255, 220, 130, 0.02));
            backdrop-filter: blur(2px);
            animation: floatVariation 8s ease-in-out infinite;
        }

        .circle-1 {
            width: 180px;
            height: 180px;
            top: 15%;
            left: -60px;
            animation-delay: 0s;
        }

        .circle-2 {
            width: 320px;
            height: 320px;
            bottom: -100px;
            right: -80px;
            animation-delay: 1s;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.1), rgba(255, 220, 130, 0.01));
        }

        .circle-3 {
            width: 120px;
            height: 120px;
            top: 50%;
            right: 20%;
            animation-delay: 2.5s;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.2), rgba(255, 220, 130, 0.03));
        }

        .circle-4 {
            width: 250px;
            height: 250px;
            bottom: 20%;
            left: 15%;
            animation-delay: 1.8s;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.08), rgba(255, 220, 130, 0.01));
        }

        .circle-5 {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 40%;
            animation-delay: 3.2s;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.25), rgba(255, 220, 130, 0.05));
        }

        .circle-6 {
            width: 200px;
            height: 200px;
            top: 70%;
            right: 30%;
            animation-delay: 0.8s;
            background: radial-gradient(circle, rgba(255, 220, 130, 0.06), rgba(255, 220, 130, 0.01));
        }

        @keyframes floatVariation {
            0% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.4;
            }
            33% {
                transform: translateY(-25px) translateX(15px) scale(1.05);
                opacity: 0.7;
            }
            66% {
                transform: translateY(15px) translateX(-10px) scale(0.98);
                opacity: 0.5;
            }
            100% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.4;
            }
        }

        /* Main content container */
        .splash-container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            animation: containerFadeIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Main brand text - Sry */
        .brand-text {
            font-size: 7rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            margin: 0;
            background: linear-gradient(135deg, #ffdc82, #ffb347, #ffdc82);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255, 220, 130, 0.4);
            animation: textGlow 3s ease-in-out infinite, gradientShift 4s ease infinite;
            transition: all 0.3s;
            cursor: default;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            0% {
                text-shadow: 0 0 20px rgba(255, 220, 130, 0.3);
            }
            50% {
                text-shadow: 0 0 45px rgba(255, 220, 130, 0.7), 0 0 15px rgba(255, 220, 130, 0.5);
            }
            100% {
                text-shadow: 0 0 20px rgba(255, 220, 130, 0.3);
            }
        }

        .brand-text:hover {
            animation: textGlow 0.8s ease-in-out infinite, gradientShift 2s ease infinite;
            transform: scale(1.02);
            letter-spacing: 0.1em;
        }

        /* Subtitle */
        .subtitle {
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            margin-top: 1.2rem;
            color: #e0e0e0;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Welcome line */
        .welcome-line {
            margin-top: 2rem;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: rgba(255, 220, 130, 0.8);
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.6s forwards;
            position: relative;
            display: inline-block;
        }

        .welcome-line::before,
        .welcome-line::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffdc82, transparent);
        }

        .welcome-line::before {
            right: calc(100% + 12px);
        }

        .welcome-line::after {
            left: calc(100% + 12px);
        }

        /* Decorative divider line */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffdc82, transparent);
            margin: 1.5rem auto 0;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.9s forwards;
        }

        /* Loading indicator */
        .loading-indicator {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.2s forwards;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffdc82;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% {
                transform: scale(0.6);
                opacity: 0.3;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .brand-text {
                font-size: 4rem;
                letter-spacing: 0.05em;
            }
            .subtitle {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }
            .welcome-line {
                font-size: 0.7rem;
                letter-spacing: 0.15em;
            }
            .welcome-line::before,
            .welcome-line::after {
                width: 15px;
            }
            .circle-1 { width: 100px; height: 100px; }
            .circle-2 { width: 200px; height: 200px; }
            .circle-3 { width: 70px; height: 70px; }
            .circle-4 { width: 150px; height: 150px; }
            .circle-5 { width: 50px; height: 50px; }
            .circle-6 { width: 120px; height: 120px; }
        }

        @media (max-width: 480px) {
            .brand-text {
                font-size: 3rem;
            }
            .subtitle {
                font-size: 0.7rem;
                letter-spacing: 0.15em;
            }
            .welcome-line {
                font-size: 0.6rem;
            }
        }

        /* Smooth entrance for decorative elements */
        .decorative-elements .circle {
            animation: floatVariation 8s ease-in-out infinite, fadeInScale 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 0.4;
                transform: scale(1);
            }
        }

        /* Additional subtle particle effect */
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 220, 130, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 12s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) translateX(20px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Gradient overlay for depth -->
    <div class="gradient-overlay"></div>

    <!-- Decorative floating circles -->
    <div class="decorative-elements">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
        <div class="circle circle-6"></div>
    </div>

    <!-- Main content -->
    <div class="splash-container">
        <h1 class="brand-text">RAMODA</h1>
        <p class="subtitle">Your favorite</p>
        <div class="divider"></div>
        <p class="welcome-line">WELCOME TO RAMODA</p>
        
        <!-- Elegant loading indicator -->
        <div class="loading-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Generate floating particles for extra cinematic feel
        function createParticles() {
            const particleCount = 40;
            const body = document.body;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random properties
                const size = Math.random() * 3 + 1;
                const left = Math.random() * 100;
                const duration = Math.random() * 15 + 8;
                const delay = Math.random() * 10;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                
                body.appendChild(particle);
            }
        }

        // Create particles after page load
        window.addEventListener('load', () => {
            createParticles();
        });

        // Redirect to welcome.html after 7 seconds with smooth timing
        let redirectTimer;
        
        function startRedirect() {
            redirectTimer = setTimeout(function() {
                window.location.href = "welcome.html";
            }, 7000);
        }
        
        // Start redirect
        startRedirect();
        
        // Optional: Add a subtle progress effect (visual feedback)
        let elapsed = 0;
        const interval = setInterval(() => {
            elapsed += 100;
            if (elapsed >= 7000) {
                clearInterval(interval);
            }
        }, 100);
        
        // Cleanup on page unload (just in case)
        window.addEventListener('beforeunload', () => {
            if (redirectTimer) clearTimeout(redirectTimer);
        });
    </script>
</body>
</html>
